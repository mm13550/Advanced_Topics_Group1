datasets:
  cap_text_repo: "common-pile/caselaw_access_project"
  cap_embeddings_repo: "free-law/Caselaw_Access_Project_embeddings"
  hf_split: "train"

# Scope, can adjust later
corpus:
  in_scope_jurisdictions:
    - "us"
    - "scotus"
  min_text_length: 200
  max_cases: null

# ChromaDB
chroma:
  persist_directory: "data/chroma_db"
  collection_name: "legal_cases"

# Chunking
chunking:
  chunk_size: 1800
  chunk_overlap: 200
  # Legal section separators, can adjust later
  separators:
    - "\n\nFACTS"
    - "\n\nBACKGROUND"
    - "\n\nANALYSIS"
    - "\n\nDISCUSSION"
    - "\n\nHOLDING"
    - "\n\nCONCLUSION"
    - "\n\nORDER"
    - "\n\nOPINION"
    - "\n\n"
    - "\n"
    - " "

# Embedding model
embeddings:
  model: "BAAI/bge-base-en-v1.5"
  dimension: 768

# Retrieval
retrieval:
  stage1_k: 20   # initial similarity search
  stage2_top_n: 10  # top n results from re-ranker
  final_k: 5    # final docs passed to LLM after reranking
  relevance_floor: 0.82     # cosine similarity threshold from EDA

# Reranker model
reranker:
  model: "cross-encoder/ms-marco-MiniLM-L-6-v2"

# LLM inference
llm:
  provider: "groq"
  model: 'llama-3.1-8b-instant' # faster, but use "llama-3.3-70b-versatile" for actual system
  temperature: 0.1 
  max_tokens: 1024